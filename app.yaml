command: ["bash", "-c", "cd backend && uvicorn main:app --host 0.0.0.0 --port ${DATABRICKS_APP_PORT:-8100}"]

env:
  - name: OPENROUTER_API_KEY
    valueFrom:
      secretRef:
        scope: ccda-app
        key: OPENROUTER_API_KEY
  - name: DATABRICKS_HOST
    valueFrom:
      secretRef:
        scope: ccda-app
        key: DATABRICKS_HOST
  - name: DATABRICKS_HTTP_PATH
    valueFrom:
      secretRef:
        scope: ccda-app
        key: DATABRICKS_HTTP_PATH
  - name: DATABRICKS_TOKEN
    valueFrom:
      secretRef:
        scope: ccda-app
        key: DATABRICKS_TOKEN
  - name: DATABRICKS_CATALOG
    value: "main"
  - name: DATABRICKS_SCHEMA
    value: "fhir_ccda"
